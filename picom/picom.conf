# Set the rendering backend
   backend = "xrender";

   # Fading effects (optional eye candy)
   fading = true;
   fade-delta = 4;

# --- PICOM RICE CONFIGURATION ---

# 1. Backend (Use glx for smooth performance and blur effects)
# NOTE: If your screen stays black or laggy, change "glx" back to "xrender"
backend = "glx";
vsync = true;

# 2. Rounded Corners
corner-radius = 12;

# Exclude specific windows from getting rounded corners (like top bars)
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# 3. Transparency / Opacity
# Sets how translucent windows are when you are NOT focused on them
active-opacity = 1.0;
inactive-opacity = 0.85;
frame-opacity = 1.0;

# Let transparency rules apply to your terminal emulator
opacity-rule = [
    "90:class_g = 'Alacritty'",
    "90:class_g = 'XTerm'"
];

# 4. Blur Effect (Frosted Glass Look)
blur-method = "gaussian";
blur-strength = 5;

# Don't blur things like your wallpaper or desktop backgrounds
blur-background-exclude = [
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@"
];

# 5. Shadows (Adds depth underneath windows)
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.4;
